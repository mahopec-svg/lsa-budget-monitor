<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSA Budget Monitor — 1122 Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0b;--surface:#111113;--surface2:#18181b;--border:#27272a;--border2:#3f3f46;--text:#fafafa;--text2:#a1a1aa;--text3:#52525b;--green:#22c55e;--green-bg:rgba(34,197,94,0.1);--yellow:#eab308;--yellow-bg:rgba(234,179,8,0.1);--red:#ef4444;--red-bg:rgba(239,68,68,0.1);--blue:#3b82f6;--accent:#f97316}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;letter-spacing:-.3px}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
.topbar-right{display:flex;align-items:center;gap:10px}
.month-badge{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:6px}
.icon-btn{display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text);background:var(--surface2);border:1px solid var(--border2);padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .15s}
.icon-btn:hover{background:var(--border)}
.icon-btn svg{width:14px;height:14px}
.save-all-btn{display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#000;background:var(--accent);border:none;padding:6px 16px;border-radius:8px;cursor:pointer;transition:all .15s}
.save-all-btn:hover{opacity:.9}
.main{padding:24px 28px;max-width:1500px;margin:0 auto}
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px}
.stat-value{font-size:22px;font-weight:600;letter-spacing:-.5px}
.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3)}
.search{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 32px;outline:none;transition:border .15s}
.search:focus{border-color:var(--border2)}
.search::placeholder{color:var(--text3)}
.filters{display:flex;gap:6px}
.filter-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.table-container{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);text-align:left;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,0.02)}
tbody td{padding:10px 14px;font-size:13px;color:var(--text);vertical-align:middle;overflow:hidden}
.firm-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cid-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.cid-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;white-space:nowrap}
.mono{font-family:'DM Mono',monospace;font-size:12px}
.checkin-input{width:100%;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 9px;outline:none;transition:border .15s}
.checkin-input:focus{border-color:var(--accent)}
.checkin-input::placeholder{color:var(--text3)}
.bar-outer{background:var(--surface2);border-radius:4px;height:5px;overflow:hidden}
.bar-inner{height:5px;border-radius:4px;transition:width .4s ease}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge-dot{width:5px;height:5px;border-radius:50%}
.b-green{background:var(--green-bg);color:var(--green)}.b-green .badge-dot{background:var(--green)}
.b-yellow{background:var(--yellow-bg);color:var(--yellow)}.b-yellow .badge-dot{background:var(--yellow)}
.b-red{background:var(--red-bg);color:var(--red)}.b-red .badge-dot{background:var(--red)}
.b-gray{background:var(--surface2);color:var(--text3)}.b-gray .badge-dot{background:var(--text3)}
.row-save{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.row-save:hover{border-color:var(--border2);color:var(--text)}
.row-save.saving{color:var(--yellow);border-color:var(--yellow-bg)}
.row-save.saved{color:var(--green);border-color:var(--green-bg)}
.row-save.error{color:var(--red);border-color:var(--red-bg)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:10px 18px;font-size:13px;color:var(--text);opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-size:13px;gap:10px}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.last-sync{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><div class="logo-dot"></div>1122 Management · LSA Budget Monitor</div>
  <div class="topbar-right">
    <span class="last-sync" id="last-sync">Loading...</span>
    <span class="month-badge" id="month-badge">May 2026</span>
    <button class="icon-btn" onclick="loadData()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      Refresh
    </button>
    <button class="save-all-btn" onclick="saveAll()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save all
    </button>
  </div>
</div>

<div class="main">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total clients</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat-card"><div class="stat-label">No check-in set</div><div class="stat-value" id="s-nocheckin" style="color:var(--text3)">—</div></div>
    <div class="stat-card"><div class="stat-label">Warning / Over</div><div class="stat-value" id="s-atrisk" style="color:var(--yellow)">—</div></div>
    <div class="stat-card"><div class="stat-label">Total May spend</div><div class="stat-value" id="s-spend" style="font-size:17px">—</div></div>
    <div class="stat-card"><div class="stat-label">Total check-in</div><div class="stat-value" id="s-checkin" style="font-size:17px">—</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search" type="text" id="search" placeholder="Search law firm or CID..." oninput="renderTable()">
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('nocheckin',this)">No check-in</button>
      <button class="filter-btn" onclick="setFilter('on-track',this)">On track</button>
      <button class="filter-btn" onclick="setFilter('warning',this)">Warning</button>
      <button class="filter-btn" onclick="setFilter('over',this)">Over budget</button>
    </div>
  </div>

  <div class="table-container">
    <div class="loading" id="loading"><div class="spinner"></div>Loading from Airtable...</div>
    <table id="main-table" style="display:none">
      <thead>
        <tr>
          <th style="width:24%">Law firm + CIDs</th>
          <th style="width:12%">Current spend</th>
          <th style="width:13%">Check-in amount</th>
          <th style="width:7%">Spent %</th>
          <th style="width:14%">Progress</th>
          <th style="width:11%">Status</th>
          <th style="width:12%">Account manager</th>
          <th style="width:7%"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PAT  = "pat0jwIs8S0z59aHY.ff7b72a9db0c3dcc62c273b1a67210f7b1a421f3285a2895b771cec289e98050";
const BASE = "appheCuF7nF8oJtX0";
const TABLE_BUDGET = "tbllfLDqclkpKXR2q";

const CID_MAP = {
  "Rush Law Firm":["8442429597"],
  "The Jeffcoat Firm":["9604466691","6407047658","7028190364"],
  "Strong Law":["2308545695","1179857603"],
  "Lloyd Baker":["3796456456","9711307196"],
  "J&Y Law Firm":["2508529713"],
  "Albers":["8666946156","9304038957"],
  "Edwards & Patterson Law Firm":["6899431323","6034651574"],
  "Dubin Law Group - Personal Injury Attorneys":["1481139533","9619975198","2537776494"],
  "Lein Law":["4167860088","8326292452","1364766911"],
  "Baggett Law":["2404342696","5662546699","6269898909"],
  "Stewart Law Offices":["2745456168"],
  "Truitt Law Offices":["2402497758"],
  "Mezrano Alabama Injury Lawyers":["8896773225","5474015501","9113493692"],
  "Gammill Law":["7614647709","7493328339"],
  "KRLG Injury Lawyers":["8659417931"],
  "Wocl Leydon":["1369439774"],
  "Levar Law Injury & Accidents Lawyers":["3440323846","9966995686"],
  "Burnetti":["6200177519","3309257137","1733757882","5077021044"],
  "Trey Harrell Auto Accident and Personal Injury Attorney":["6236521337"],
  "Horton & Mendez":["6075027111","4415390772","7086893431","4314043146"],
  "Martinson & Beason":["6632493203"],
  "Law Offices of Gary Martin Hays & Associates, P.C.":["3095734423"],
  "Davis, Saperstein & Salomon":["3046088460","3547826213"],
  "Lee Steinberg Law Firm":["6852397583"],
  "Tittle & Perlmuter":["2904005537"],
  "Michigan Auto Law":["3241290833","1574317392","7375150025"],
  "Attorney Brian White Personal Injury Lawyers":["1672985674","7035353509"],
  "Eltringham Law Group":["2935397952","7569990691"],
  "Onward Law":["8737583750","4978346454","8595506435"],
  "Schwartzapfel Lawyers":["9347921566"],
  "DeWitt Law Firm":["3628586199","8965637349","9524499244"],
  "Cain Law":["1547850276"],
  "Dormer Harpring":["9094548768"],
  "Peterson Law Firm":["7545846621","4228308790"],
  "Tehrani":["1691867144","1041460301"],
  "JustCallMoe Injury & Accident Attorneys":["1636007358","7361922754","5070118945","8976468048"],
  "Diefer":["5946941621","6375770344"],
  "Scott Vicknair":["7077376209"],
  "Shulman & Hill - Brooklyn Personal Injury Lawyer":["1772520374"],
  "Aulsbrook Car & Truck Wreck Injury Lawyers":["9797245500"],
  "ME Lawyers":["7048085313"],
};

let records = [];
let currentFilter = 'all';

function fmt(n){return '$'+(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtK(n){return n>=1000?'$'+(n/1000).toFixed(1)+'k':fmt(n)}

function getStatus(spend, checkin) {
  if(!checkin) return {label:'No check-in',cls:'b-gray'};
  const p = spend/checkin;
  if(p>=1.1) return {label:'Over budget',cls:'b-red'};
  if(p>=1.0) return {label:'Completed',cls:'b-gray'};
  if(p>=0.9) return {label:'Warning',cls:'b-yellow'};
  return {label:'On track',cls:'b-green'};
}

function getBarColor(spend, checkin) {
  if(!checkin) return 'var(--border2)';
  const p = spend/checkin;
  if(p>=1.1) return 'var(--red)';
  if(p>=0.9) return 'var(--yellow)';
  return 'var(--green)';
}

function getMonth(){return new Date().toLocaleString('en-US',{month:'long',year:'numeric'})}
function getMonthStart(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`}

async function loadData() {
  document.getElementById('loading').style.display='flex';
  document.getElementById('main-table').style.display='none';
  document.getElementById('last-sync').textContent='Syncing...';
  const monthStart = getMonthStart();
  let all=[], offset=null;
  try {
    do {
      let url=`https://api.airtable.com/v0/${BASE}/${TABLE_BUDGET}?filterByFormula=IS_SAME({Month},'${monthStart}','month')`;
      if(offset) url+=`&offset=${offset}`;
      const resp = await fetch(url,{headers:{'Authorization':`Bearer ${PAT}`}});
      const data = await resp.json();
      if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
      all = all.concat(data.records||[]);
      offset = data.offset||null;
    } while(offset);

    records = all.map(r => {
      const f = r.fields||{};
      const name = (f['Client Name']||'Unknown').trim();
      const cids = CID_MAP[name] || [];
      return {
        id: r.id,
        name,
        spend: f['Current Spend']||0,
        checkin: f['Approved Monthly Budget']||0,
        manager: getManager(f),
        cids,
        saved: true,
        dirty: false
      };
    }).sort((a,b) => b.spend - a.spend);

    const now = new Date();
    document.getElementById('last-sync').textContent=`Synced ${now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`;
    document.getElementById('month-badge').textContent=getMonth();
    renderStats();
    renderTable();
    document.getElementById('loading').style.display='none';
    document.getElementById('main-table').style.display='table';
  } catch(e) {
    document.getElementById('loading').innerHTML=`<span style="color:var(--red)">Error: ${e.message}</span>`;
  }
}

function getManager(f) {
  try {
    const v = f['Account Manager Email (Auto)'];
    if(Array.isArray(v)&&v.length) return v[0];
    if(v?.valuesByLinkedRecordId){const vals=Object.values(v.valuesByLinkedRecordId);if(vals.length&&vals[0].length)return vals[0][0];}
    if(typeof v==='string') return v;
  } catch(e){}
  return '—';
}

function renderStats() {
  const total = records.length;
  const noCheckin = records.filter(r=>!r.checkin).length;
  const atRisk = records.filter(r=>r.checkin&&r.spend/r.checkin>=0.9).length;
  const totalSpend = records.reduce((a,r)=>a+r.spend,0);
  const totalCheckin = records.reduce((a,r)=>a+r.checkin,0);
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-nocheckin').textContent=noCheckin;
  document.getElementById('s-atrisk').textContent=atRisk;
  document.getElementById('s-spend').textContent=fmtK(totalSpend);
  document.getElementById('s-checkin').textContent=totalCheckin?fmtK(totalCheckin):'—';
}

function setFilter(f,btn) {
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  return records.filter(r => {
    if(q&&!r.name.toLowerCase().includes(q)&&!r.cids.some(c=>c.includes(q))) return false;
    if(currentFilter==='nocheckin') return !r.checkin;
    if(currentFilter==='on-track') return r.checkin&&r.spend/r.checkin<0.9;
    if(currentFilter==='warning') return r.checkin&&r.spend/r.checkin>=0.9&&r.spend/r.checkin<1.1;
    if(currentFilter==='over') return r.checkin&&r.spend/r.checkin>=1.1;
    return true;
  });
}

function renderTable() {
  const rows = getFiltered();
  const tbody = document.getElementById('tbody');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="8" style="text-align:center;padding:48px;color:var(--text3)">No records match</td></tr>';return;}
  tbody.innerHTML = rows.map(r => {
    const p = r.checkin ? Math.round((r.spend/r.checkin)*100) : null;
    const barW = r.checkin ? Math.min(100,Math.round((r.spend/r.checkin)*100)) : 0;
    const bc = getBarColor(r.spend,r.checkin);
    const s = getStatus(r.spend,r.checkin);
    const mgr = r.manager!=='—' ? r.manager.split('@')[0] : '—';
    const pctColor = !r.checkin?'var(--text3)':r.spend/r.checkin>=1.1?'var(--red)':r.spend/r.checkin>=0.9?'var(--yellow)':'var(--green)';
    const cidTags = r.cids.length?`<div class="cid-tags">${r.cids.map(c=>`<span class="cid-tag">${c}</span>`).join('')}</div>`:'';
    return `<tr>
      <td><div class="firm-name" title="${r.name}">${r.name}</div>${cidTags}</td>
      <td><span class="mono">${fmt(r.spend)}</span></td>
      <td><input class="checkin-input" type="number" min="0" step="500" value="${r.checkin||''}" placeholder="Enter amount" data-id="${r.id}" oninput="onCheckinInput('${r.id}',this.value)"></td>
      <td><span class="mono" style="font-weight:500;color:${pctColor}">${p!==null?p+'%':'—'}</span></td>
      <td><div class="bar-outer"><div class="bar-inner" style="width:${barW}%;background:${bc}"></div></div></td>
      <td><span class="badge ${s.cls}"><span class="badge-dot"></span>${s.label}</span></td>
      <td><span style="font-size:12px;color:var(--text2)">${mgr}</span></td>
      <td><button class="row-save ${r.dirty?'':r.saved?'saved':''}" id="btn-${r.id}" onclick="saveSingle('${r.id}',this)">${r.dirty?'Save':r.saved?'Saved ✓':'Save'}</button></td>
    </tr>`;
  }).join('');
}

function onCheckinInput(id, val) {
  const r = records.find(x=>x.id===id);
  if(!r) return;
  r.checkin = parseFloat(val)||0;
  r.dirty=true; r.saved=false;
  renderStats();
  const btn=document.getElementById(`btn-${id}`);
  if(btn){btn.textContent='Save';btn.className='row-save';}
}

async function patchRecord(id, checkin) {
  const resp = await fetch(`https://api.airtable.com/v0/${BASE}/${TABLE_BUDGET}/${id}`,{
    method:'PATCH',
    headers:{'Authorization':`Bearer ${PAT}`,'Content-Type':'application/json'},
    body: JSON.stringify({fields:{'Approved Monthly Budget': checkin}})
  });
  return resp.ok;
}

async function saveSingle(id, btn) {
  const r = records.find(x=>x.id===id);
  if(!r) return;
  btn.textContent='...'; btn.className='row-save saving';
  const ok = await patchRecord(id, r.checkin);
  if(ok){r.saved=true;r.dirty=false;btn.textContent='Saved ✓';btn.className='row-save saved';showToast(`Saved — ${r.name}`);renderStats();}
  else{btn.textContent='Error';btn.className='row-save error';showToast('Save failed');}
}

async function saveAll() {
  const dirty = records.filter(r=>r.dirty||(!r.saved&&r.checkin>0));
  if(!dirty.length){showToast('All check-in amounts already saved');return;}
  showToast(`Saving ${dirty.length} check-in amounts...`);
  let saved=0;
  for(const r of dirty){
    const ok = await patchRecord(r.id, r.checkin);
    if(ok){r.saved=true;r.dirty=false;saved++;}
  }
  renderTable(); renderStats();
  showToast(`✓ Saved ${saved} of ${dirty.length} check-in amounts`);
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),3000);
}

loadData();
</script>
</body>
</html>
